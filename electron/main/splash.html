<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="NeuroStock - Solution de gestion de stock intelligente" />
  <meta name="theme-color" content="#0f0f1a" />
  <title>NeuroStock | Gestion de stock intelligente</title>
  <style>
    /* ===== Variables CSS ===== */
    :root {
      --color-primary: #6366f1;
      --color-secondary: #8b5cf6;
      --color-accent: #06b6d4;
      --color-bg-dark: #0f0f1a;
      --color-text-muted: rgba(148, 163, 184, 0.6);
      --color-text-faint: rgba(148, 163, 184, 0.25);
      --color-glow-primary: rgba(99, 102, 241, 0.55);
      --color-glow-secondary: rgba(139, 92, 246, 0.25);
      --size-logo: 120px;
      --size-halo: 180px;
      --size-ring: 148px;
      --animation-duration: 3s;
    }

    /* ===== Reset & Base ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 100vw;
      height: 100vh;
      background: var(--color-bg-dark);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
      color: #ffffff;
    }

    /* ===== Background Effects ===== */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 25% 35%, rgba(99, 102, 241, 0.18) 0%, transparent 55%),
        radial-gradient(ellipse at 75% 65%, rgba(139, 92, 246, 0.14) 0%, transparent 55%);
      animation: pulseBackground var(--animation-duration) ease-in-out infinite alternate;
      will-change: opacity;
    }

    @keyframes pulseBackground {
      from { opacity: 0.5; }
      to   { opacity: 1; }
    }

    body::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.035) 1px, transparent 1px);
      background-size: 28px 28px;
      pointer-events: none;
    }

    /* ===== Layout ===== */
    main {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      animation: fadeInUp 0.55s ease-out forwards;
      will-change: transform, opacity;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    footer {
      position: absolute;
      bottom: 18px;
      font-size: 0.68rem;
      color: var(--color-text-faint);
      letter-spacing: 0.1em;
    }

    /* ===== Logo Section ===== */
    .logo-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      width: var(--size-halo);
      height: var(--size-halo);
    }

    .logo-halo {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(99, 102, 241, 0.22) 0%, transparent 70%);
      animation: haloPulse 2.5s ease-in-out infinite alternate;
      will-change: transform, opacity;
    }

    @keyframes haloPulse {
      from { transform: scale(0.9); opacity: 0.6; }
      to   { transform: scale(1.1); opacity: 1; }
    }

    .logo-ring {
      position: absolute;
      width: var(--size-ring);
      height: var(--size-ring);
      border-radius: 50%;
      border: 1.5px solid transparent;
      background:
        linear-gradient(var(--color-bg-dark), var(--color-bg-dark)) padding-box,
        linear-gradient(135deg, var(--color-primary), var(--color-secondary), transparent, var(--color-accent)) border-box;
      animation: rotateSlow 5s linear infinite;
      will-change: transform;
    }

    @keyframes rotateSlow {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .logo-img {
      position: relative;
      z-index: 2;
      width: var(--size-logo);
      height: var(--size-logo);
      object-fit: contain;
      filter:
        drop-shadow(0 0 16px var(--color-glow-primary))
        drop-shadow(0 0 32px var(--color-glow-secondary));
      animation: logoFloat var(--animation-duration) ease-in-out infinite;
      will-change: transform;
    }

    @keyframes logoFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-4px); }
    }

    /* ===== Fallback Logo ===== */
    .logo-fallback {
      display: none;
      position: relative;
      z-index: 2;
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, var(--color-primary), var(--color-secondary), var(--color-accent));
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 30px var(--color-glow-primary);
    }

    .logo-fallback svg {
      width: 52px;
      height: 52px;
      stroke: white;
      stroke-width: 1.8;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ===== Text Elements ===== */
    .app-tagline {
      font-size: clamp(0.7rem, 2vw, 0.78rem);
      color: var(--color-text-muted);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-align: center;
    }

    /* ===== Progress Bar ===== */
    .progress-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: clamp(180px, 80vw, 200px);
    }

    .progress-bar-track {
      width: 100%;
      height: 2.5px;
      background: rgba(255, 255, 255, 0.07);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--color-primary), var(--color-secondary), var(--color-accent));
      animation: loadProgress 2.4s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      box-shadow: 0 0 6px var(--color-glow-primary);
      will-change: width;
    }

    @keyframes loadProgress {
      0%   { width: 0%; }
      25%  { width: 30%; }
      55%  { width: 62%; }
      80%  { width: 85%; }
      100% { width: 100%; }
    }

    .progress-label {
      font-size: clamp(0.6rem, 1.5vw, 0.7rem);
      color: var(--color-text-muted);
      letter-spacing: 0.06em;
      opacity: 0.8;
    }

    /* ===== Responsive ===== */
    @media (max-width: 480px) {
      .logo-wrapper {
        width: 140px;
        height: 140px;
      }
      .logo-img {
        width: 100px;
        height: 100px;
      }
      .logo-ring {
        width: 120px;
        height: 120px;
      }
      .logo-halo {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <header>
      <div class="logo-wrapper">
        <div class="logo-halo" aria-hidden="true"></div>
        <div class="logo-ring" aria-hidden="true"></div>
        <img
          class="logo-img"
          src="/logo-full-transaparent.png"
          alt="Logo NeuroStock - Gestion de stock intelligente"
          onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='flex';"
          loading="lazy"
        />
        <div class="logo-fallback" role="img" aria-label="Logo NeuroStock">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
            <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
            <line x1="12" y1="22.08" x2="12" y2="12"/>
          </svg>
        </div>
      </div>
      <p class="app-tagline">Gestion de stock intelligente</p>
    </header>

    <div class="progress-section" aria-live="polite">
      <div class="progress-bar-track">
        <div class="progress-bar-fill" aria-hidden="true"></div>
      </div>
      <div class="progress-label" id="status">Initialisation...</div>
    </div>
  </main>

  <footer>
    <span class="version">v1.0.0</span>
  </footer>

  <script>
    (() => {
      const messages = [
        'Initialisation...',
        'Chargement des modules...',
        'Connexion à la base de données...',
        'Préparation de l\'interface...',
        'Presque prêt...',
      ];
      const statusElement = document.getElementById('status');
      let currentIndex = 0;

      const updateStatus = () => {
        if (currentIndex < messages.length) {
          statusElement.textContent = messages[currentIndex];
          currentIndex++;
        } else {
          clearInterval(intervalId);
        }
      };

      const intervalId = setInterval(updateStatus, 480);
      updateStatus(); // Afficher le premier message immédiatement
    })();
  </script>
</body>
</html>
